name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-run a deploy from the Actions tab without pushing a commit.
  workflow_dispatch:

# GITHUB_TOKEN needs these to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it, so a half-published
# site is never left live.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` installs exactly what package-lock.json pins, so a deploy can
      # never pick up a different dependency version than you tested with.
      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
